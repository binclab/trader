<!DOCTYPE html>
<html>
<head>
  <title>Deriv OAuth Redirect</title>
  <style>
    body { font-family: sans-serif; padding: 2em; }
    #status { font-weight: bold; }
  </style>
</head>
<body>

<div id="status">Processing Deriv login…</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);

  const code  = params.get("code");
  const fullState = params.get("state");

  if (!code || !fullState) {
    document.getElementById("status").textContent = "Missing OAuth parameters.";
    return;
  }

  // Extract randomState and backendIP
  const [randomState, backendIP] = fullState.split("||");

  if (!backendIP) {
    document.getElementById("status").textContent = "Invalid state format.";
    return;
  }

  // ✔ NEW FLOW:
  // Instead of validating state or PKCE verifier here,
  // forward everything to backend /trader endpoint.
  const redirectUrl =
    `https://${backendIP}/trader/index.html`
    + `?code=${encodeURIComponent(code)}`
    + `&state=${encodeURIComponent(randomState)}`;

  window.location.href = redirectUrl;
})();
</script>

</body>
</html>
