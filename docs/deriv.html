<!DOCTYPE html>
<html>
<head>
  <title>Deriv OAuth Redirect</title>
  <style>
    body { font-family: sans-serif; padding: 2em; }
    #status { font-weight: bold; }
  </style>
</head>
<body>

<div id="status">Processing Deriv login…</div>
  
<script>
(function () {
  const params = new URLSearchParams(window.location.search);

  const code  = params.get("code");
  const fullState = params.get("state");

  if (!code || !fullState) {
    document.getElementById("status").textContent = "Missing OAuth parameters.";
    return;
  }

  // Split state into: randomState || backendIP
  const [randomState, backendIP] = fullState.split("||");

  if (!backendIP) {
    document.getElementById("status").textContent = "Invalid state format.";
    return;
  }

  // Validate PKCE state
  const storedState = sessionStorage.getItem("oauth_state");
  if (randomState !== storedState) {
    document.getElementById("status").textContent = "State mismatch. Login aborted.";
    return;
  }

  // Retrieve PKCE verifier
  const codeVerifier = sessionStorage.getItem("pkce_code_verifier");
  if (!codeVerifier) {
    document.getElementById("status").textContent = "Missing PKCE verifier.";
    return;
  }

  // Forward to backend for token exchange
  const url = `http://${backendIP}:5000/api/oauth/token`;

  fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      code: code,
      code_verifier: codeVerifier
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.ok) {
      // Backend says token exchange succeeded
      window.location.href = `https://${backendIP}/trader`;
      return;
    }

    document.getElementById("status").textContent = "Token exchange failed.";
  })
  .catch(err => {
    document.getElementById("status").textContent = "Network error.";
  });

})();
</script>

</body>
</html>
