<!DOCTYPE html>
<html>
<head>
  <title>Forward Deriv OAuth</title>
  <style>
    body { font-family: sans-serif; padding: 2em; }
    button { padding: 0.6em 1.2em; font-size: 1em; }
    #status { margin-top: 1em; font-weight: bold; }
  </style>
</head>
<body>
<script>
const params = new URLSearchParams(window.location.search);
const state = params.get('state'); // e.g. "192.168.1.100%3A80"

if (state) {
  const decoded = decodeURIComponent(state); // "192.168.1.100:80"
  const [ip, port] = decoded.split(':');

  const query = window.location.search;
  const protocol = port === 443 || port === '443' ? 'https' : 'http';
  const redirectUrl = `${protocol}://${ip}:${port}/${query}`;

  const statusDiv = document.createElement('div');
  statusDiv.id = 'status';
  statusDiv.textContent = "🔄 Redirecting to server…";
  document.body.appendChild(statusDiv);

  window.location.href = redirectUrl;
}
</script>

</body>
</html>
